name: Alioth Build

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Enable ReSukiSU (KernelSU)'
        required: true
        type: boolean
        default: true
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Sync workspace (persist between builds)
        run: |
          # Always clean clone — avoids stale build artifacts
          sudo rm -rf ${{ github.workspace }}/build || true
          git clone --depth=1 https://github.com/${{ github.repository }}.git -b ${{ github.ref_name }} ${{ github.workspace }}/build

      - name: Build Docker image
        working-directory: build
        run: docker build -t kernel-builder .

      - name: Build kernel
        run: |
          mkdir -p /tmp/ccache-cache
          # Copy source into container (no .git) to avoid prepare3 dirty-tree check
          docker run --rm \
            -v ${{ github.workspace }}/build:/source:ro \
            -v /tmp/ccache-cache:/root/.ccache \
            -e KSU=${{ inputs.ksu == false && '0' || '1' }} \
            -e KBUILD_BUILD_TIMESTAMP='' \
            -e KBUILD_BUILD_VERSION=${{ github.run_number }} \
            kernel-builder \
            bash -c "cp -a /source/. /workspace/ && cd /workspace && rm -rf .git && chmod +x build-kernel.sh && KSU=\$KSU bash build-kernel.sh"

      - name: Fix file permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/build || true

      - name: QA Gates
        working-directory: build
        run: |
          echo "=== QA Gates ==="
          FAILED=0
          if [ "${{ inputs.ksu }}" == "true" ]; then
            if grep -q "CONFIG_KSU=y" out/.config 2>/dev/null; then
              echo "Gate 0 (KSU): PASS"
            else
              echo "Gate 0 (KSU): FAIL"; FAILED=1
            fi
            if grep -q "CONFIG_KSU_MANUAL_HOOK=y" out/.config 2>/dev/null; then
              echo "Gate 1 (Hook mode): PASS"
            else
              echo "Gate 1 (Hook mode): WARN"
            fi
          else
            echo "Gate 0-1: SKIPPED (vanilla)"
          fi
          for gate in "KALLSYMS:CONFIG_KALLSYMS=y" "SELinux:CONFIG_SECURITY_SELINUX=y"; do
            NAME="${gate%%:*}"; CFG="${gate##*:}"
            if grep -q "$CFG" out/.config 2>/dev/null; then
              echo "Gate ($NAME): PASS"
            else
              echo "Gate ($NAME): FAIL"; FAILED=1
            fi
          done
          if grep -Eq "CONFIG_ANDROID_BINDER_IPC=[ym]" out/.config 2>/dev/null; then
            echo "Gate (Binder): PASS"
          else
            echo "Gate (Binder): FAIL"; FAILED=1
          fi
          IMAGE=""
          for f in out/arch/arm64/boot/Image out/arch/arm64/boot/Image.gz-dtb; do
            [ -f "$f" ] && IMAGE="$f" && break
          done
          if [ -n "$IMAGE" ]; then
            SIZE=$(stat -c%s "$IMAGE" 2>/dev/null)
            [ "$SIZE" -gt 15728640 ] && echo "Gate (Size): PASS ($SIZE)" || { echo "Gate (Size): FAIL ($SIZE)"; FAILED=1; }
          else
            echo "Gate (Image): FAIL"; FAILED=1
          fi
          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            echo "Gate (dtbo.img): PASS"
          elif [ -f "out/arch/arm64/boot/dtb" ]; then
            echo "Gate (dtb): PASS"
          else
            echo "Gate (dtb): WARN (dtbo.img not found)"
          fi
          if [ -f "out/arch/arm64/boot/dtb" ]; then
            echo "Gate (dtb): PASS"
          else
            echo "Gate (dtb): WARN (dtb not found)"
          fi
          [ "$FAILED" -eq 1 ] && { echo "=== QA GATES FAILED ==="; exit 1; }
          echo "=== QA GATES PASSED ==="

      - name: Package AnyKernel3 ZIP
        working-directory: build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          KSU_ENABLED: ${{ inputs.ksu }}
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          KSU_LABEL="ReSukiSU"
          [ "${{ inputs.ksu }}" != "true" ] && KSU_LABEL="Vanilla"
          ZIP_NAME="alioth-kernel-${BUILD_DATE}-b${BUILD_NUMBER}-${KSU_LABEL}.zip"

          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git anykernel3
          cp out/arch/arm64/boot/Image.gz anykernel3/
          cp out/arch/arm64/boot/dtbo.img anykernel3/ 2>/dev/null || true
          cd anykernel3
          dos2unix anykernel.sh META-INF/com/google/android/update-binary META-INF/com/google/android/updater-script tools/ak3-core.sh 2>/dev/null || true
          zip -r9 "../${ZIP_NAME}" * -x '.git' '.github' 'README.md' '*placeholder'
          cd ..
      - name: Upload ZIP
        uses: actions/upload-artifact@v6
        with:
          name: anykernel3-zip
          path: build/alioth-kernel-*.zip
          if-no-files-found: error

      - name: Set release env
        if: inputs.release == true
        working-directory: build
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          BUILD_DATE=$(date +'%Y%m%d')
          TAG_NAME="v${BUILD_DATE}-b${BUILD_NUMBER}"
          KSU_LABEL="ReSukiSU"
          [ "${{ inputs.ksu }}" != "true" ] && KSU_LABEL="Vanilla"
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "KSU_LABEL=${KSU_LABEL}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "ZIP_FILE=${ZIP_FILE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Alioth Kernel ${{ env.KSU_LABEL }} - ${{ env.BUILD_DATE }}"
          body: |
            ## RedAlpha Kernel Build

            - **Date:** ${{ env.BUILD_DATE }}
            - **Device:** Poco F3/Redmi K40/Mi 11X (alioth/SM8250)
            - **Kernel:** 4.19.325
            - **Variant:** ${{ env.KSU_LABEL }}

            Flash via TWRP.
          files: build/${{ env.ZIP_FILE }}
