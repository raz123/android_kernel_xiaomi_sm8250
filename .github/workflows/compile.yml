name: Alioth Build

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Enable ReSukiSU (KernelSU)'
        required: true
        type: boolean
        default: true
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Sync workspace
        run: |
          sudo rm -rf ${{ github.workspace }}/build || true
          git clone --depth=1 https://github.com/${{ github.repository }}.git -b ${{ github.ref_name }} ${{ github.workspace }}/build

      - name: Build Docker image
        working-directory: build
        run: docker build -t kernel-builder .

      - name: Build kernel
        run: |
          # Remove .git before Docker to prevent prepare3 dirty-tree check
          rm -rf ${{ github.workspace }}/build/.git
          mkdir -p /tmp/ccache-cache
          docker run --rm \
            -v ${{ github.workspace }}/build:/workspace \
            -v /tmp/ccache-cache:/root/.ccache \
            -w /workspace \
            -e KSU=${{ inputs.ksu == false && '0' || '1' }} \
            -e KBUILD_BUILD_TIMESTAMP='' \
            -e KBUILD_BUILD_VERSION=${{ github.run_number }} \
            kernel-builder \
            bash -c "chmod +x build-kernel.sh && KSU=\$KSU bash build-kernel.sh"

      - name: Fix file permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/build || true

      - name: QA Gates
        working-directory: build
        run: |
          echo "=== QA Gates ==="
          FAILED=0
          if [ "${{ inputs.ksu }}" == "true" ]; then
            if grep -q "CONFIG_KSU=y" out/.config 2>/dev/null; then
              echo "Gate 0 (KSU): PASS"
            else
              echo "Gate 0 (KSU): FAIL"; FAILED=1
            fi
          else
            echo "Gate 0: SKIPPED (vanilla)"
          fi
          for gate in "KALLSYMS:CONFIG_KALLSYMS=y" "SELinux:CONFIG_SECURITY_SELINUX=y"; do
            NAME="${gate%%:*}"; CFG="${gate##*:}"
            if grep -q "$CFG" out/.config 2>/dev/null; then
              echo "Gate ($NAME): PASS"
            else
              echo "Gate ($NAME): FAIL"; FAILED=1
            fi
          done
          if grep -Eq "CONFIG_ANDROID_BINDER_IPC=[ym]" out/.config 2>/dev/null; then
            echo "Gate (Binder): PASS"
          else
            echo "Gate (Binder): FAIL"; FAILED=1
          fi
          if [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Gate (Image): PASS"
          else
            echo "Gate (Image): FAIL"; FAILED=1
          fi
          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            echo "Gate (dtbo): PASS"
          else
            echo "Gate (dtbo): WARN"
          fi
          [ "$FAILED" -eq 1 ] && { echo "=== QA GATES FAILED ==="; exit 1; }
          echo "=== QA GATES PASSED ==="

      - name: Install packaging tools
        run: sudo pacman -S --noconfirm zip dos2unix

      - name: Package AnyKernel3 ZIP
        working-directory: build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          KSU_LABEL="ReSukiSU"
          [ "${{ inputs.ksu }}" != "true" ] && KSU_LABEL="Vanilla"
          ZIP_NAME="alioth-kernel-${BUILD_DATE}-b${BUILD_NUMBER}-${KSU_LABEL}.zip"

          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git anykernel3

          cat > anykernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=Alioth Kernel for Poco F3/Redmi K40/Mi 11X
          do.devicecheck=1
          device.name1=alioth
          device.name2=mi 11x
          device.name3=redmi k40
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          BLOCK=/dev/block/bootdevice/by-name/boot
          IS_SLOT_DEVICE=1
          RAMDISK_COMPRESSION=auto
          PATCH_VBMETA_FLAG=auto
          '; }
          . tools/ak3-core.sh
          split_boot
          patch_cmdline zswap.enabled 1
          patch_cmdline zswap.compressor lz4
          patch_cmdline zswap.zpool z3fold
          patch_cmdline zswap.max_pool_percent 25
          flash_boot
          AKEOF

          cp out/arch/arm64/boot/Image.gz anykernel3/
          cp out/arch/arm64/boot/dtbo.img anykernel3/ 2>/dev/null || true

          cd anykernel3
          dos2unix anykernel.sh META-INF/com/google/android/update-binary \
            META-INF/com/google/android/updater-script tools/ak3-core.sh 2>/dev/null || true
          zip -r9 "../${ZIP_NAME}" * -x '.git' '.github' 'README.md' '*placeholder'

      - name: Upload ZIP
        uses: actions/upload-artifact@v6
        with:
          name: anykernel3-zip
          path: build/alioth-kernel-*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "Alioth Kernel ${{ inputs.ksu == true && 'ReSukiSU' || 'Vanilla' }} - ${{ github.run_number }}"
          body: |
            ## Alioth Kernel Build
            - **Device:** Poco F3/Redmi K40/Mi 11X (alioth/SM8250)
            - **Kernel:** 4.19
            - **Variant:** ${{ inputs.ksu == true && 'ReSukiSU' || 'Vanilla' }}
          files: build/alioth-kernel-*.zip
