name: Compile kernel

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Enable ReSukiSU (KernelSU)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex bc ccache lz4 cpio \
            python3-dev libssl-dev libelf-dev clang lld llvm \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gawk dwarves erofs-utils zip tar xz-utils dos2unix

      - name: Build kernel
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          KSU: ${{ inputs.ksu == true && '1' || '0' }}
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Clean previous build artifacts
          make ARCH=arm64 mrproper 2>/dev/null || true

          # Generate merged defconfig
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- vendor/xiaomi/alioth_defconfig

          # Merge vendor overlays
          scripts/kconfig/merge_config.sh -m .config \
            arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
            arch/arm64/configs/vendor/xiaomi/alioth.config

          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig

          # Enable ReSukiSU if requested
          if [ "$KSU" = "1" ]; then
            scripts/config --file .config --enable CONFIG_KSU
            scripts/config --file .config --enable CONFIG_KSU_MANUAL_HOOK
            scripts/config --file .config --set-val CONFIG_KSU_VERSION "v1.0.0"
            make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig
          fi

          # Build Image + dtbo with build number in build string
          make ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) \
            KBUILD_BUILD_USER=Rve \
            KBUILD_BUILD_HOST=RvEnterprises \
            KBUILD_BUILD_TIMESTAMP='' \
            KBUILD_BUILD_VERSION=${BUILD_NUMBER} \
            Image.gz dtbs 2>&1 | tee out/compile.log

          # Verify output
          ls -la arch/arm64/boot/Image.gz
          ls -la arch/arm64/boot/dtbo.img

      - name: Package AnyKernel3 zip
        id: package
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          KSU: ${{ inputs.ksu == true && '1' || '0' }}
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          KSU_LABEL="ReSukiSU"
          [ "$KSU" = "0" ] && KSU_LABEL="Vanilla"
          ZIP_NAME="alioth-kernel-${BUILD_DATE}-b${BUILD_NUMBER}-${KSU_LABEL}.zip"

          # Clone AnyKernel3
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git anykernel3

          # Configure AnyKernel3
          cat > anykernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers

          properties() { '
          kernel.string=Alioth Kernel for Poco F3/Redmi K40/Mi 11X
          do.devicecheck=1
          device.name1=alioth
          device.name2=mi 11x
          device.name3=redmi k40
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          BLOCK=/dev/block/bootdevice/by-name/boot
          IS_SLOT_DEVICE=1
          RAMDISK_COMPRESSION=auto
          PATCH_VBMETA_FLAG=auto
          '; }

          . tools/ak3-core.sh

          split_boot

          # Enable zswap at boot via kernel cmdline
          patch_cmdline zswap.enabled 1
          patch_cmdline zswap.compressor lz4
          patch_cmdline zswap.zpool z3fold
          patch_cmdline zswap.max_pool_percent 25

          flash_boot
          AKEOF

          # Copy kernel image
          cp arch/arm64/boot/Image.gz anykernel3/
          # Copy dtbo if exists
          cp arch/arm64/boot/dtbo.img anykernel3/ 2>/dev/null || true

          # Fix CRLF and package
          cd anykernel3
          dos2unix anykernel.sh META-INF/com/google/android/update-binary \
            META-INF/com/google/android/updater-script tools/ak3-core.sh 2>/dev/null || true

          zip -r9 "../${ZIP_NAME}" * -x '.git' '.github' 'README.md' '*placeholder'
          cd ..
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: alioth-kernel-*.zip
