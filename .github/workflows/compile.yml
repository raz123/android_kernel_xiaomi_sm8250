name: Alioth Build

on:
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Enable ReSukiSU (KernelSU)'
        required: true
        type: boolean
        default: true
      release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Sync workspace
        run: |
          sudo rm -rf ${{ github.workspace }}/build || true
          git clone --depth=1 https://github.com/${{ github.repository }}.git -b ${{ github.ref_name }} ${{ github.workspace }}/build

      - name: Build Docker image
        working-directory: build
        run: docker build -t kernel-builder .

      - name: Build kernel
        run: |
          # Remove .git before Docker to prevent prepare3 dirty-tree check
          rm -rf ${{ github.workspace }}/build/.git
          mkdir -p /tmp/ccache-cache
          docker run --rm \
            -v ${{ github.workspace }}/build:/workspace \
            -v /tmp/ccache-cache:/root/.ccache \
            -w /workspace \
            -e KSU=${{ inputs.ksu == false && '0' || '1' }} \
            -e KBUILD_BUILD_TIMESTAMP='' \
            -e KBUILD_BUILD_VERSION=${{ github.run_number }} \
            kernel-builder \
            bash -c "chmod +x build-kernel.sh && KSU=\$KSU bash build-kernel.sh"

      - name: Fix file permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/build || true

      - name: QA Gates
        working-directory: build
        run: |
          echo "=== QA Gates ==="
          FAILED=0
          if [ "${{ inputs.ksu }}" == "true" ]; then
            if grep -q "CONFIG_KSU=y" out/.config 2>/dev/null; then
              echo "Gate 0 (KSU): PASS"
            else
              echo "Gate 0 (KSU): FAIL"; FAILED=1
            fi
          else
            echo "Gate 0: SKIPPED (vanilla)"
          fi
          for gate in "KALLSYMS:CONFIG_KALLSYMS=y" "SELinux:CONFIG_SECURITY_SELINUX=y"; do
            NAME="${gate%%:*}"; CFG="${gate##*:}"
            if grep -q "$CFG" out/.config 2>/dev/null; then
              echo "Gate ($NAME): PASS"
            else
              echo "Gate ($NAME): FAIL"; FAILED=1
            fi
          done
          if grep -Eq "CONFIG_ANDROID_BINDER_IPC=[ym]" out/.config 2>/dev/null; then
            echo "Gate (Binder): PASS"
          else
            echo "Gate (Binder): FAIL"; FAILED=1
          fi
          if [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "Gate (Image): PASS"
          else
            echo "Gate (Image): FAIL"; FAILED=1
          fi
          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            echo "Gate (dtbo): PASS"
          else
            echo "Gate (dtbo): WARN"
          fi
          [ "$FAILED" -eq 1 ] && { echo "=== QA GATES FAILED ==="; exit 1; }
          echo "=== QA GATES PASSED ==="

      - name: Package AnyKernel3 ZIP
        working-directory: build
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          KSU_ENABLED: ${{ inputs.ksu }}
        run: bash scripts/package-kernel.sh

      - name: Upload ZIP
        uses: actions/upload-artifact@v6
        with:
          name: anykernel3-zip
          path: build/alioth-kernel_*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.release == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "Alioth Kernel ${{ inputs.ksu == true && 'ReSukiSU' || 'Vanilla' }} - ${{ github.run_number }}"
          body: |
            ## Alioth Kernel Build
            - **Device:** Poco F3/Redmi K40/Mi 11X (alioth/SM8250)
            - **Kernel:** 4.19
            - **Variant:** ${{ inputs.ksu == true && 'ReSukiSU' || 'Vanilla' }}
          files: build/alioth-kernel-*.zip
